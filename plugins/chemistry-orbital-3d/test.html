  <script type="text/babel">
    function factorial(n){if(n<=1)return 1;let r=1;for(let i=2;i<=n;i++)r*=i;return r}
    function associatedLaguerre(n,alpha,x){if(n===0)return 1;if(n===1)return 1+alpha-x;let L0=1,L1=1+alpha-x,L2=0;for(let k=2;k<=n;k++){L2=((2*k-1+alpha-x)*L1-(k-1+alpha)*L0)/k;L0=L1;L1=L2}return L2}
    function associatedLegendre(l,m,x){const absM=Math.abs(m);if(absM>l)return 0;let pmm=1.0;if(absM>0){const somx2=Math.sqrt((1-x)*(1+x));let fact=1.0;for(let i=1;i<=absM;i++){pmm*=-fact*somx2;fact+=2.0}}if(l===absM)return pmm;let pmmp1=x*(2*absM+1)*pmm;if(l===absM+1)return pmmp1;let pll=0;for(let ll=absM+2;ll<=l;ll++){pll=((2*ll-1)*x*pmmp1-(ll+absM-1)*pmm)/(ll-absM);pmm=pmmp1;pmmp1=pll}return pll}
    function getRadialWavefunction(n,l,r,Z){const a0=1.0,rho=(2*Z*r)/(n*a0);const coeff=Math.sqrt(Math.pow(2*Z/(n*a0),3)*factorial(n-l-1)/(2*n*factorial(n+l)));return coeff*Math.pow(rho,l)*Math.exp(-rho/2)*associatedLaguerre(n-l-1,2*l+1,rho)}
    function getSphericalHarmonic(l,m,type,theta,phi){const ct=Math.cos(theta),st=Math.sin(theta);if(type){if(l===0)return 1/Math.sqrt(4*Math.PI);if(l===1){if(type==='x')return Math.sqrt(3/(4*Math.PI))*st*Math.cos(phi);if(type==='y')return Math.sqrt(3/(4*Math.PI))*st*Math.sin(phi);if(type==='z')return Math.sqrt(3/(4*Math.PI))*ct}else if(l===2){if(type==='z2')return Math.sqrt(5/(16*Math.PI))*(3*ct*ct-1);if(type==='xz')return Math.sqrt(15/(4*Math.PI))*st*ct*Math.cos(phi);if(type==='yz')return Math.sqrt(15/(4*Math.PI))*st*ct*Math.sin(phi);if(type==='xy')return Math.sqrt(15/(4*Math.PI))*st*st*Math.sin(phi)*Math.cos(phi);if(type==='x2-y2')return Math.sqrt(15/(16*Math.PI))*st*st*Math.cos(2*phi)}else if(l===3){const s2=st*st,c2=ct*ct;if(type==='z3')return Math.sqrt(7/(16*Math.PI))*(5*c2*ct-3*ct);if(type==='xz2')return Math.sqrt(21/(32*Math.PI))*(5*c2-1)*st*Math.cos(phi);if(type==='yz2')return Math.sqrt(21/(32*Math.PI))*(5*c2-1)*st*Math.sin(phi);if(type==='xyz')return Math.sqrt(105/(4*Math.PI))*s2*ct*Math.sin(phi)*Math.cos(phi);if(type==='z(x2-y2)')return Math.sqrt(105/(16*Math.PI))*s2*ct*Math.cos(2*phi);if(type==='x(x2-3y2)')return Math.sqrt(35/(32*Math.PI))*s2*st*(Math.cos(phi)*Math.cos(2*phi)-Math.sin(phi)*Math.sin(2*phi));if(type==='y(3x2-y2)')return Math.sqrt(35/(32*Math.PI))*s2*st*(Math.sin(phi)*Math.cos(2*phi)+Math.cos(phi)*Math.sin(2*phi))}}const absM=Math.abs(m),Plm=associatedLegendre(l,absM,ct);const norm=Math.sqrt((2*l+1)/(4*Math.PI)*factorial(l-absM)/factorial(l+absM));if(m===0)return norm*Plm;return m>0?norm*Plm*Math.cos(m*phi)*Math.sqrt(2):norm*Plm*Math.sin(absM*phi)*Math.sqrt(2)}

    function OrbitalViewer({ node }) {
      const props = node.properties || {}
      const orbitalType = typeof props.orbital === 'string' ? props.orbital : '2p_z'
      const particleCountProp = typeof props.particleCount === 'number' ? props.particleCount : 50000

      const containerRef = React.useRef(null)
      const engineRef = React.useRef(null)
      const [ready, setReady] = React.useState(false)
      const [engineReady, setEngineReady] = React.useState(false)
      const [loading, setLoading] = React.useState(false)
      const [selectedOrbital, setSelectedOrbital] = React.useState(orbitalType)
      const [orbitalInfo, setOrbitalInfo] = React.useState(null)
      const [infoCollapsed, setInfoCollapsed] = React.useState(true)
      const [sidebarCollapsed, setSidebarCollapsed] = React.useState(false)
      const [particleCount, setParticleCount] = React.useState(particleCountProp)
      const [particleSize, setParticleSize] = React.useState(0.06)
      const [particleOpacity, setParticleOpacity] = React.useState(0.6)
      const [glowIntensity, setGlowIntensity] = React.useState(1.5)

      React.useEffect(()=>{if(typeof THREE!=='undefined'&&THREE.OrbitControls){setReady(true)}else{const t=setInterval(()=>{if(typeof THREE!=='undefined'&&THREE.OrbitControls){clearInterval(t);setReady(true)}},100);return()=>clearInterval(t)}},[])

      const createTextSprite=(text,color)=>{const c=document.createElement('canvas');const ctx=c.getContext('2d');c.width=128;c.height=128;ctx.clearRect(0,0,128,128);ctx.font='Bold 80px Arial';ctx.fillStyle=color;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(text,64,64);const tex=new THREE.CanvasTexture(c);const mat=new THREE.SpriteMaterial({map:tex});const s=new THREE.Sprite(mat);s.scale.set(1.5,1.5,1);return s}
      const createGlowTexture=()=>{const c=document.createElement('canvas');c.width=64;c.height=64;const ctx=c.getContext('2d');const g=ctx.createRadialGradient(32,32,0,32,32,32);g.addColorStop(0,'rgba(255,255,255,1)');g.addColorStop(0.4,'rgba(255,255,255,0.9)');g.addColorStop(0.7,'rgba(255,255,255,0.4)');g.addColorStop(0.9,'rgba(255,255,255,0.1)');g.addColorStop(1,'rgba(255,255,255,0)');ctx.fillStyle=g;ctx.fillRect(0,0,64,64);return new THREE.CanvasTexture(c)}

      const initScene=React.useCallback(()=>{
        const container=containerRef.current;if(!container||engineRef.current)return
        const W=container.clientWidth,H=container.clientHeight
        const scene=new THREE.Scene();scene.background=new THREE.Color(0x0a0a0a);scene.fog=new THREE.Fog(0x0a0a0a,10,50)
        const camera=new THREE.PerspectiveCamera(75,W/H,0.1,1000);camera.position.set(0,0,15)
        const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});renderer.setSize(W,H);renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));container.appendChild(renderer.domElement)
        const controls=new THREE.OrbitControls(camera,renderer.domElement);controls.enableDamping=true;controls.dampingFactor=0.05;controls.autoRotate=false
        scene.add(new THREE.AmbientLight(0xffffff,0.3));const pl=new THREE.PointLight(0xffffff,1,100);pl.position.set(5,5,5);scene.add(pl)
        scene.add(new THREE.Mesh(new THREE.SphereGeometry(0.3,32,32),new THREE.MeshPhongMaterial({color:0xffffff,emissive:0x444444,shininess:100})))
        const al=10,ar=0.01;const ma=(c,rx,ry)=>{const m=new THREE.Mesh(new THREE.CylinderGeometry(ar,ar,al,8),new THREE.MeshBasicMaterial({color:c}));if(rx)m.rotation.x=rx;if(ry)m.rotation.z=ry;scene.add(m)}
        ma(0xff0000,0,Math.PI/2);ma(0x00ff00,0,0);ma(0x0000ff,Math.PI/2,0)
        const xL=createTextSprite('X','#ff0000');xL.position.set(al/2+1,0,0);scene.add(xL)
        const yL=createTextSprite('Y','#00ff00');yL.position.set(0,al/2+1,0);scene.add(yL)
        const zL=createTextSprite('Z','#0000ff');zL.position.set(0,0,al/2+1);scene.add(zL)
        let animId=0;const animate=()=>{animId=requestAnimationFrame(animate);controls.update();renderer.render(scene,camera)}
        animId=requestAnimationFrame(animate)
        engineRef.current={scene,camera,renderer,controls,animId,particleSystem:null}
        setEngineReady(true)
      },[])

      React.useEffect(()=>{if(!ready||!containerRef.current)return;const t=setTimeout(()=>initScene(),100);return()=>clearTimeout(t)},[ready,initScene])
      React.useEffect(()=>{return()=>{const e=engineRef.current;if(e){cancelAnimationFrame(e.animId);e.renderer.dispose();e.controls.dispose()}}},[])

      const generateOrbital=React.useCallback((orbitalValue,count)=>{
        const engine=engineRef.current;if(!engine)return;setLoading(true)
        setTimeout(()=>{
          const orbital=orbitals.find(o=>o.value===orbitalValue);if(!orbital){setLoading(false);return}
          const{n,l,m,type,color1:c1,color2:c2}=orbital;const color1=new THREE.Color(c1),color2=new THREE.Color(c2)
          const Z=1,searchRadius=8,scaleFactor=1.0/n
          setOrbitalInfo({n,l,m,name:orbital.label,radialNodes:n-l-1,angularNodes:l,totalNodes:n-1,shellName:['K','L','M','N','O','P','Q'][n-1]||`n=${n}`,subshellName:['s','p','d','f','g','h'][l]||`l=${l}`})
          const positions=[],colors=[],sizes=[]
          let maxProb=0;for(let i=0;i<2000;i++){const tr=Math.random()*searchRadius,tT=Math.acos(2*Math.random()-1),tP=Math.random()*2*Math.PI;const R=getRadialWavefunction(n,l,tr/scaleFactor,Z),Y=getSphericalHarmonic(l,m,type,tT,tP),p=R*R*Y*Y*tr*tr;if(p>maxProb)maxProb=p}
          let generated=0,attempts=0;while(generated<count&&attempts<count*1000){attempts++;const r=Math.random()*searchRadius,cosTheta=2*Math.random()-1,theta=Math.acos(cosTheta),phi=Math.random()*2*Math.PI;const physicalR=r/scaleFactor;const R=getRadialWavefunction(n,l,physicalR,Z),Y=getSphericalHarmonic(l,m,type,theta,phi),psi=R*Y,prob=psi*psi*r*r;if(Math.random()*maxProb<prob){positions.push(r*Math.sin(theta)*Math.cos(phi),r*Math.sin(theta)*Math.sin(phi),r*Math.cos(theta));const c=psi>0?color1:color2;colors.push(c.r,c.g,c.b);sizes.push(0.05);generated++}}
          if(engine.particleSystem){engine.scene.remove(engine.particleSystem);engine.particleSystem.geometry.dispose();engine.particleSystem.material.dispose()}
          const geo=new THREE.BufferGeometry();geo.setAttribute('position',new THREE.Float32BufferAttribute(positions,3));geo.setAttribute('color',new THREE.Float32BufferAttribute(colors,3));geo.setAttribute('size',new THREE.Float32BufferAttribute(sizes,1))
          const mat=new THREE.PointsMaterial({size:particleSize,vertexColors:true,transparent:true,opacity:particleOpacity*(glowIntensity/1.5),blending:THREE.AdditiveBlending,depthWrite:false,sizeAttenuation:true,map:createGlowTexture()})
          const ps=new THREE.Points(geo,mat);engine.scene.add(ps);engine.particleSystem=ps;setLoading(false)
        },50)
      },[])

      React.useEffect(()=>{if(engineReady&&selectedOrbital)generateOrbital(selectedOrbital,particleCount)},[selectedOrbital,engineReady,particleCount,generateOrbital])
      React.useEffect(()=>{if(orbitalType&&orbitalType!==selectedOrbital)setSelectedOrbital(orbitalType)},[orbitalType])

      const handleOrbitalChange=(e)=>setSelectedOrbital(e.target.value)
      const selectStyle={width:'100%',padding:'8px',background:'rgba(255,255,255,0.1)',border:'1px solid rgba(255,255,255,0.2)',borderRadius:4,color:'#fff',fontSize:14,cursor:'pointer'}

      return (
        <div style={{display:'flex',background:'#0a0a0a',color:'#fff',fontFamily:'Manrope, sans-serif',height:'100%'}}>
          <div style={{width:sidebarCollapsed?50:280,background:'rgba(20,20,20,0.9)',padding:sidebarCollapsed?'16px 4px':24,overflowY:'auto',borderRight:'1px solid rgba(255,255,255,0.1)',position:'relative',transition:'width 0.3s,padding 0.3s'}}>
            <button onClick={()=>setSidebarCollapsed(!sidebarCollapsed)} style={{position:'absolute',top:16,right:16,width:32,height:32,background:'linear-gradient(135deg,#00ffff,#ff00ff)',color:'#fff',border:'none',borderRadius:4,cursor:'pointer',fontSize:16,fontWeight:'bold',zIndex:20}}>{sidebarCollapsed?'→':'←'}</button>
            {!sidebarCollapsed&&<div>
              <h2 style={{margin:'0 0 24px',fontSize:24,background:'linear-gradient(135deg,#00ffff,#ff00ff)',backgroundClip:'text',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>原子轨道可视化</h2>
              <div style={{marginBottom:24}}><label style={{display:'block',marginBottom:4,fontSize:13,color:'#aaa'}}>轨道类型</label><select value={selectedOrbital} onChange={handleOrbitalChange} style={selectStyle}>{orbitals.map(o=><option key={o.value} value={o.value} style={{background:'#1a1a1a'}}>{o.label}</option>)}</select></div>
              <div style={{marginBottom:24}}><label style={{display:'block',marginBottom:4,fontSize:13,color:'#aaa'}}>粒子数量: {particleCount}</label><input type="range" min={10000} max={100000} step={5000} value={particleCount} onChange={e=>setParticleCount(Number(e.target.value))} style={{width:'100%',accentColor:'#00ffff'}} /></div>
              <div style={{marginBottom:24}}><label style={{display:'block',marginBottom:4,fontSize:13,color:'#aaa'}}>粒子大小: {particleSize.toFixed(2)}</label><input type="range" min={0.01} max={0.2} step={0.01} value={particleSize} onChange={e=>setParticleSize(Number(e.target.value))} style={{width:'100%',accentColor:'#00ffff'}} /></div>
              <div style={{marginBottom:24}}><label style={{display:'block',marginBottom:4,fontSize:13,color:'#aaa'}}>粒子透明度: {particleOpacity.toFixed(2)}</label><input type="range" min={0.1} max={1.0} step={0.05} value={particleOpacity} onChange={e=>setParticleOpacity(Number(e.target.value))} style={{width:'100%',accentColor:'#00ffff'}} /></div>
              <div style={{marginBottom:24}}><label style={{display:'block',marginBottom:4,fontSize:13,color:'#aaa'}}>发光强度: {glowIntensity.toFixed(1)}</label><input type="range" min={0.5} max={3.0} step={0.1} value={glowIntensity} onChange={e=>setGlowIntensity(Number(e.target.value))} style={{width:'100%',accentColor:'#00ffff'}} /></div>
              <div style={{marginTop:32,padding:12,background:'rgba(255,255,255,0.05)',borderRadius:4,fontSize:13,color:'#888'}}><p style={{margin:'8px 0'}}>拖动旋转</p><p style={{margin:'8px 0'}}>滚轮缩放</p></div>
            </div>}
          </div>
          <div style={{flex:1,position:'relative'}}>
            <div ref={containerRef} style={{width:'100%',height:'100%'}} />
            {loading&&<div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',fontSize:24,color:'#00ffff'}}>生成中...</div>}
            {orbitalInfo&&orbitalInfo.name&&<div style={{position:'absolute',top:24,right:24,background:'rgba(20,20,20,0.9)',backdropFilter:'blur(10px)',border:'1px solid rgba(0,255,255,0.3)',borderRadius:8,padding:infoCollapsed?'12px 16px':16,minWidth:infoCollapsed?'auto':250,boxShadow:'0 4px 20px rgba(0,0,0,0.5)',zIndex:10}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer',userSelect:'none'}} onClick={()=>setInfoCollapsed(!infoCollapsed)}>
                <h3 style={{margin:0,fontSize:16,color:'#00ffff',borderBottom:infoCollapsed?'none':'1px solid rgba(0,255,255,0.2)',paddingBottom:infoCollapsed?0:8,marginBottom:infoCollapsed?0:16}}>轨道信息</h3>
                <span style={{color:'#00ffff',fontSize:12}}>{infoCollapsed?'▼':'▲'}</span>
              </div>
              {!infoCollapsed&&<div style={{display:'flex',flexDirection:'column',gap:12}}>
                {[['名称',orbitalInfo.name],['能层',`${orbitalInfo.shellName} (n=${orbitalInfo.n})`],['能级',`${orbitalInfo.subshellName} (l=${orbitalInfo.l})`],['磁量子数',`m=${orbitalInfo.m}`],['径向节点',String(orbitalInfo.radialNodes)],['角节点',String(orbitalInfo.angularNodes)],['总节点数',String(orbitalInfo.totalNodes)]].map(([label,value])=><div key={label} style={{display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:13}}><span style={{color:'#aaa',fontWeight:500}}>{label}:</span><span style={{color:'#fff',fontFamily:'monospace',background:'rgba(0,255,255,0.1)',padding:'2px 8px',borderRadius:4}}>{value}</span></div>)}
              </div>}
            </div>}
          </div>
        </div>
      )
    }

    let currentNode = { properties: { orbital: '2p_z' } }
    function showOrbital(orbital, name) { currentNode = { properties: { orbital } }; document.getElementById('status').textContent = '当前: ' + name; renderApp() }
    function renderApp() { ReactDOM.render(React.createElement(OrbitalViewer, { node: currentNode }), document.getElementById('component-mount')) }
    window.showOrbital = showOrbital
    renderApp()
  </script>
</body>
</html>
